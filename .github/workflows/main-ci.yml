name: Internal - Main - Continuous Integration

on:
  push:
    branches: [main]
    tags: ["*"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/__shared-ci.yml
    permissions:
      actions: read
      contents: read
      packages: read
      pull-requests: write
      id-token: write
      issues: write
      security-events: write
      statuses: write

  npm-publish:
    name: Publish package to npm
    needs: ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    uses: hoverkraft-tech/ci-github-nodejs/.github/workflows/release.yml@df348077afa4e79725151d50606e9dc63f86dcb6 # 0.24.4
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      package-tarball-artifact-id: ${{ needs.ci.outputs.package-tarball-artifact-id }}

  deploy:
    if: github.ref_name == github.event.repository.default_branch
    name: Deploy website
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.url }}
    outputs:
      page-url: ${{ steps.deployment.outputs.url }}
    steps:
      - id: deployment
        uses: hoverkraft-tech/ci-github-publish/actions/deploy/github-pages@ed354ada70b9f518c2bb663e18a80041c2cf5156 # 0.27.1
        with:
          build-path: packages/docs/build
          build-artifact-id: ${{ needs.ci.outputs.build-artifact-id }}
