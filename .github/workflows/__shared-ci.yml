name: Common Continuous Integration tasks

on:
  workflow_call:
    outputs:
      build-artifact-id:
        description: "The artifact ID of the build output"
        value: ${{ jobs.nodejs.outputs.build-artifact-id }}
      package-tarball-artifact-id:
        description: "The artifact ID of the uploaded package tarball"
        value: ${{ jobs.package-test.outputs.package-tarball-artifact-id }}

permissions: {}

jobs:
  linter:
    uses: hoverkraft-tech/ci-github-common/.github/workflows/linter.yml@4c9d51717dc04d823dac2dc9ac2857e7b3069454 # 0.35.0
    permissions:
      actions: read
      contents: read
      security-events: write
      statuses: write
    with:
      linter-env: |
        FILTER_REGEX_EXCLUDE=packages/theme/lib/**/*,packages/docs/build/**/*
        VALIDATE_TYPESCRIPT_ES=false
        VALIDATE_JAVASCRIPT_ES=false
        VALIDATE_TSX=false
        VALIDATE_CSS=false

  nodejs:
    uses: hoverkraft-tech/ci-github-nodejs/.github/workflows/continuous-integration.yml@a10d5e32daef8e060c49fe617833fb0d53476f22 # 0.24.0
    permissions:
      contents: read
      id-token: write
      packages: read
      pull-requests: write
      security-events: write
    with:
      build: |
        {
          "artifact": ["packages/theme/lib", "packages/docs/build"]
        }

  package-test:
    name: Package and verify Docusaurus theme
    needs: [linter, nodejs]
    runs-on: ubuntu-latest
    outputs:
      package-tarball-artifact-id: ${{ steps.package.outputs.package-tarball-artifact-id }}
    permissions:
      contents: read
    steps:
      - id: package
        name: Create package tarball
        uses: hoverkraft-tech/ci-github-nodejs/actions/package@a10d5e32daef8e060c49fe617833fb0d53476f22 # 0.24.0
        with:
          working-directory: .
          package-directory: packages/theme
          build-artifact-id: ${{ needs.nodejs.outputs.build-artifact-id }}
          build-artifact-path: /
          version: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

      - name: Build docs with packaged theme
        working-directory: packages/docs
        env:
          PACKAGE_TARBALL_PATH: ${{ steps.package.outputs.package-tarball-path }}
        run: |
          npm uninstall @hoverkraft/docusaurus-theme || true
          npm install "${PACKAGE_TARBALL_PATH}"
          npm run build
